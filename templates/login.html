{% extends "base.html" %}

{% block titulo %}Iniciar sesión · Foja{% endblock %}

{% block estilos_extra %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        padding: 3rem 1rem;
    }
    .auth-card {
        max-width: 460px;
        width: 100%;
        margin: 0 auto;
        background: #fff;
        border-radius: var(--radius);
        border: 1px solid var(--line);
        border-top: 3px solid var(--gold);
        padding: 3rem 2.5rem;
        box-shadow: var(--shadow-md);
    }
    .auth-card h2 {
        font-size: 1.8rem;
        margin-bottom: .4rem;
        text-align: center;
    }
    .auth-card .subtitle {
        text-align: center;
        color: var(--muted);
        margin-bottom: 2rem;
        font-size: .95rem;
    }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: .9rem;
    }
    .auth-footer a {
        color: var(--gold-dark);
        font-weight: 500;
    }
    .auth-footer a:hover { color: var(--navy); }
</style>
{% endblock %}

{% block contenido %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>Iniciar sesión</h2>
        <p class="subtitle">Accedé a tu cuenta para descargar expedientes.</p>

        <form id="formLogin">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="tu@estudio.com" autocomplete="email" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Tu contraseña" autocomplete="current-password" required>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="recuerdame" name="recuerdame">
                <label class="form-check-label" for="recuerdame">Recordarme en este dispositivo</label>
            </div>

            <button type="submit" class="btn-foja w-100">
                Iniciar sesión <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div id="alertaError" class="alert alert-danger d-none mt-3" role="alert"></div>

        <div class="auth-footer">
            ¿No tenés cuenta? <a href="/auth/signup">Crear cuenta</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const recuerdame = document.getElementById('recuerdame').checked;
    const alerta = document.getElementById('alertaError');

    alerta.classList.add('d-none');

    const btn = e.target.querySelector('button[type="submit"]');
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Conectando...';

    try {
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ email, password, recuerdame })
        });
        const datos = await response.json();

        if (response.ok) {
            window.location.href = '/dashboard';
        } else {
            alerta.textContent = datos.error || 'No pudimos iniciar tu sesión.';
            alerta.classList.remove('d-none');
        }
    } catch (error) {
        alerta.textContent = 'Error de conexión. Intentá nuevamente.';
        alerta.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        btn.innerHTML = original;
    }
});
</script>
{% endblock %}
